<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GarajeOS</title>
  <meta name="description" content="Gestión de taller mecánico" />
  <meta name="theme-color" content="#1c1c1e" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
  <script>
    (function () {
      const saved = localStorage.getItem('garajeos_theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved === 'light' ? 'light' : saved === 'dark' ? 'dark' : (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <div id="app">
  <div id="dev-banner" class="dev-banner hidden"></div>
  <div id="update-banner" class="update-banner hidden">
    🔄 Nueva versión disponible
    <button class="update-banner-btn" data-action="apply-update">Actualizar ahora</button>
  </div>
    <div id="auth-screen" class="auth-screen hidden">
      <div class="auth-card">
        <div class="auth-logo">
          <span class="logo-icon">🔧</span>
          <h1>GarajeOS</h1>
          <p class="auth-subtitle">Gestión de taller mecánico</p>
        </div>
        <div id="login-form" class="auth-form">
          <input type="email" id="login-email" placeholder="Correo electrónico" autocomplete="email" />
          <input type="password" id="login-password" placeholder="Contraseña" autocomplete="current-password" />
          <div id="auth-error" class="auth-error hidden"></div>
          <button id="btn-login" class="btn btn-primary btn-full">Iniciar sesión</button>
          <button id="btn-google" class="btn btn-google btn-full">
            <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
            Continuar con Google
          </button>
        </div>
      </div>
    </div>

    <div id="main-app" class="main-app hidden">
      <header class="topbar">
        <div class="topbar-left">
          <span class="app-logo">🔧</span>
          <span class="app-name">GarajeOS</span>
        </div>
        <div class="topbar-right">
          <div id="user-chip" class="user-chip" title="Usuario actual">
            <div id="user-avatar" class="user-avatar"></div>
            <span id="user-name" class="user-name"></span>
          </div>
          <button id="btn-logout" class="icon-btn" title="Cerrar sesión">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </header>

      <div class="view-stack">
        <div id="view-list" class="view view-list">
        <aside class="sidebar">
          <nav class="sidebar-nav">
            <button class="nav-tab active" data-tab="calendario">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              Agenda
            </button>
            <button class="nav-tab" data-tab="clientes">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              Clientes
            </button>
            <button class="nav-tab" data-tab="coches">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
              Coches
            </button>
            <button class="nav-tab" data-tab="facturas">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
              Facturas
            </button>
          </nav>

          <div id="panel-calendario" class="sidebar-panel active"></div>

          <div id="panel-clientes" class="sidebar-panel">
            <div class="panel-header">
              <div class="search-box">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="search-clientes" placeholder="Buscar cliente..." />
                <button class="search-clear hidden" data-target="search-clientes" aria-label="Limpiar búsqueda">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>
              <button id="btn-add-cliente" class="add-btn" title="Nuevo cliente">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
            </div>
            <ul id="list-clientes" class="item-list"></ul>
          </div>

          <div id="panel-coches" class="sidebar-panel">
            <div class="panel-header">
              <div class="search-box">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="search-coches" placeholder="Matrícula, marca..." />
                <button class="search-clear hidden" data-target="search-coches" aria-label="Limpiar búsqueda">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>
            </div>
            <ul id="list-coches" class="item-list"></ul>
          </div>

          <div id="panel-facturas" class="sidebar-panel">
            <ul id="list-facturas" class="item-list"></ul>
          </div>
        </aside>
        </div>

        <div id="view-detail" class="view view-detail">
          <div class="view-nav">
            <button id="btn-back" class="btn-back">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
              <span id="back-label">Volver</span>
            </button>
          </div>
          <div id="detail-content" class="detail-scroll"></div>
        </div>
      </div>

      <footer class="footer">
        <div class="footer-theme">
          <button class="theme-btn" data-theme-val="light" title="Tema claro">☀️</button>
          <button class="theme-btn" data-theme-val="dark" title="Tema oscuro">🌙</button>
          <button class="theme-btn" data-theme-val="auto" title="Automático">✨</button>
        </div>
        <span class="footer-copy">GarajeOS · 2026<span id="footer-version" class="app-footer-version"></span></span>
        <button id="btn-cal-subscribe" class="icon-btn hidden" data-action="open-cal-subscription" title="Suscribir calendario">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
        </button>
        <button id="btn-info" class="icon-btn footer-info" title="Acerca de">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </button>
      </footer>
    </div>
  </div>

  <!-- Modales -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-container" class="modal-container">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close" class="icon-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
